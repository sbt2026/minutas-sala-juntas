name: Build APK
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: minutas-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      - name: Publicar APK en rama apk
        run: |
          mkdir out && cp app/build/outputs/apk/debug/app-debug.apk out/minutas-sala-juntas.apk
          cd out
          git init -b apk
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "APK build ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" apk
